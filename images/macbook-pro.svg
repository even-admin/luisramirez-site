<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 340" fill="none">
  <!-- MacBook Pro — Technical line drawing, Apple design patent style -->
  <!-- Screen -->
  <rect x="100" y="40" width="280" height="185" rx="6" stroke="#0A0A0A" stroke-width="1.5" fill="none"/>
  <!-- Screen inner bezel -->
  <rect x="108" y="48" width="264" height="169" rx="3" stroke="#0A0A0A" stroke-width="0.75" fill="none" opacity="0.3"/>
  <!-- Camera notch -->
  <rect x="228" y="40" width="24" height="6" rx="3" stroke="#0A0A0A" stroke-width="0.75" fill="none" opacity="0.5"/>
  <!-- Camera dot -->
  <circle cx="240" cy="43" r="1.5" fill="#0A0A0A" opacity="0.3"/>
  <!-- Hinge -->
  <line x1="95" y1="225" x2="385" y2="225" stroke="#0A0A0A" stroke-width="1" opacity="0.4"/>
  <!-- Base/keyboard deck -->
  <path d="M80 228 L95 225 L385 225 L400 228 L400 250 Q400 256 394 256 L86 256 Q80 256 80 250 Z" stroke="#0A0A0A" stroke-width="1.5" fill="none"/>
  <!-- Trackpad -->
  <rect x="195" y="243" width="90" height="6" rx="3" stroke="#0A0A0A" stroke-width="0.75" fill="none" opacity="0.3"/>
  <!-- Keyboard suggestion (dot grid) -->
  <g opacity="0.15">
    <line x1="120" y1="234" x2="360" y2="234" stroke="#0A0A0A" stroke-width="0.5"/>
    <line x1="120" y1="238" x2="360" y2="238" stroke="#0A0A0A" stroke-width="0.5"/>
    <line x1="125" y1="242" x2="355" y2="242" stroke="#0A0A0A" stroke-width="0.5"/>
  </g>
  <!-- Apple logo on screen (centered) -->
  <circle cx="240" cy="130" r="8" stroke="#0A0A0A" stroke-width="0.75" fill="none" opacity="0.15"/>
  <!-- Dimension lines -->
  <line x1="65" y1="40" x2="65" y2="256" stroke="#0A0A0A" stroke-width="0.5" opacity="0.2"/>
  <line x1="61" y1="40" x2="69" y2="40" stroke="#0A0A0A" stroke-width="0.5" opacity="0.2"/>
  <line x1="61" y1="256" x2="69" y2="256" stroke="#0A0A0A" stroke-width="0.5" opacity="0.2"/>
  <!-- Shadow -->
  <ellipse cx="240" cy="268" rx="150" ry="5" fill="#0A0A0A" opacity="0.04"/>
</svg>
