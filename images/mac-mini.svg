<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" fill="none">
  <!-- Mac Mini — Technical line drawing, Apple design patent style -->
  <!-- Base/body -->
  <rect x="90" y="140" width="300" height="38" rx="8" stroke="#0A0A0A" stroke-width="1.5" fill="none"/>
  <!-- Top surface -->
  <rect x="90" y="100" width="300" height="44" rx="8" stroke="#0A0A0A" stroke-width="1.5" fill="none"/>
  <!-- Top lid seam -->
  <line x1="90" y1="140" x2="390" y2="140" stroke="#0A0A0A" stroke-width="0.75" stroke-dasharray="2,4"/>
  <!-- Apple logo circle (top center) -->
  <circle cx="240" cy="120" r="6" stroke="#0A0A0A" stroke-width="1" fill="none"/>
  <!-- Power LED -->
  <circle cx="240" cy="186" r="2" fill="#0A0A0A" opacity="0.3"/>
  <!-- Bottom edge detail -->
  <line x1="110" y1="178" x2="370" y2="178" stroke="#0A0A0A" stroke-width="0.5" opacity="0.3"/>
  <!-- Rear ports suggestion -->
  <rect x="140" y="146" width="8" height="5" rx="1" stroke="#0A0A0A" stroke-width="0.75" fill="none" opacity="0.4"/>
  <rect x="155" y="146" width="8" height="5" rx="1" stroke="#0A0A0A" stroke-width="0.75" fill="none" opacity="0.4"/>
  <rect x="170" y="146" width="8" height="5" rx="1" stroke="#0A0A0A" stroke-width="0.75" fill="none" opacity="0.4"/>
  <rect x="185" y="146" width="14" height="5" rx="1" stroke="#0A0A0A" stroke-width="0.75" fill="none" opacity="0.4"/>
  <rect x="206" y="146" width="14" height="5" rx="1" stroke="#0A0A0A" stroke-width="0.75" fill="none" opacity="0.4"/>
  <!-- Dimension lines -->
  <line x1="70" y1="100" x2="70" y2="178" stroke="#0A0A0A" stroke-width="0.5" opacity="0.2"/>
  <line x1="66" y1="100" x2="74" y2="100" stroke="#0A0A0A" stroke-width="0.5" opacity="0.2"/>
  <line x1="66" y1="178" x2="74" y2="178" stroke="#0A0A0A" stroke-width="0.5" opacity="0.2"/>
  <!-- Shadow line -->
  <ellipse cx="240" cy="195" rx="140" ry="4" fill="#0A0A0A" opacity="0.04"/>
</svg>
